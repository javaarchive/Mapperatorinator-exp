defaults:
  - v29
  - _self_

compile: false          # PyTorch 2.0 optimization
mixed_precision: 'bf16'         # Enable mixed precision (no/fp16/bf16)
enable_lora: true              # Use LoRA for finetuning

pretrained_path: "OliBomby/Mapperatorinator-v29.1"     # Path to pretrained model weights

data:                  # Data settings
  dataset_type: "mmrs"
  train_dataset_path: ""
  test_dataset_path: ""
  train_dataset_start: 0
  train_dataset_end: 3
  test_dataset_start: 0
  test_dataset_end: 3

